name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Microcopy gate (no em dashes in visible copy)
        run: python scripts/lint_microcopy.py

      - name: Dependency-audit gate (known vulnerabilities)
        run: |
          python -m pip install pip-audit
          python scripts/audit_deps.py

      - name: Generate synthetic demo data
        run: python scripts/make_synthetic_data.py

      - name: Retrieval-quality gate (no wrong grounding notes)
        run: python scripts/eval_retrieval.py

      - name: Tests
        run: pytest -q
